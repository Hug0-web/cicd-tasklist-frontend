server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy to the backend API.
    # CHANGE_ME: point this at the backend service/host (e.g. http://tasklist-backend:3001).
    location /api/ {
        proxy_pass http://tasklist-backend:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback: let React Router / client-side routing handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
